name: FX経済指標 15分前通知

on:
  schedule:
    # 5分ごとに実行（UTC）
    - cron: '*/5 * * * *'
  # 手動実行も可能（テストモードを選択できる）
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'テストモード（1=テスト通知を送る、0=通常動作）'
        required: false
        default: '0'

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: 通知スクリプトを実行
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          TEST_MODE: ${{ github.event.inputs.test_mode || '0' }}
        run: python notify.py
